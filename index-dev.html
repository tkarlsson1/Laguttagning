<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>v3.2-dev — Laguttagning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e1110;
      --surface:    #161c18;
      --surface2:   #1d2520;
      --border:     #2a332c;
      --green:      #4caf6e;
      --green-dim:  #2e7d4a;
      --text:       #e8ede9;
      --muted:      #6b7a6e;
      --danger:     #e05c5c;
      --warn:       #e0a85c;
      --info:       #5c9ee0;
      --diff-green: #4caf6e;
      --diff-blue:  #5c9ee0;
      --diff-red:   #e05c5c;
      --diff-black: #b0b8b3;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }
    .view { display: none; min-height: 100vh; }
    .view.active { display: flex; flex-direction: column; }

    /* ── LOGIN ───────────────────────────────────────── */
    #view-login { align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    #view-login::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 58px, rgba(76,175,110,.04) 58px, rgba(76,175,110,.04) 60px);
      pointer-events: none;
    }
    .login-card {
      position: relative; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 3rem; width: 100%; max-width: 420px;
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
    }
    .login-logo { font-family: var(--font-display); font-size: 2.8rem; letter-spacing: .08em; color: var(--green); line-height: 1; margin-bottom: .25rem; }
    .login-sub  { font-size: .85rem; color: var(--muted); margin-bottom: 2rem; }

    /* ── SHARED FORM ─────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.2rem; }
    .field label { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .field input, .field select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font-body); font-size: .95rem;
      padding: .75rem 1rem; transition: border-color .2s; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--green); }
    .field select option { background: var(--surface); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

    .btn-primary {
      background: var(--green); color: #0e1110; border: none; border-radius: 8px;
      font-family: var(--font-display); font-size: 1.2rem; letter-spacing: .08em;
      padding: .85rem 1.5rem; cursor: pointer; transition: background .2s, transform .1s;
    }
    .btn-primary:hover  { background: #5dc97f; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { background: var(--green-dim); cursor: not-allowed; }
    .btn-primary.full { width: 100%; margin-top: .5rem; }

    .btn-secondary {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: var(--font-body); font-size: .9rem;
      padding: .75rem 1.5rem; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: var(--text); color: var(--text); }

    .btn-danger {
      background: transparent; border: 1px solid rgba(224,92,92,.3); border-radius: 8px;
      color: var(--danger); font-family: var(--font-body); font-size: .9rem;
      padding: .75rem 1.5rem; cursor: pointer; transition: background .2s;
    }
    .btn-danger:hover { background: rgba(224,92,92,.1); }

    .error-msg {
      background: rgba(224,92,92,.12); border: 1px solid rgba(224,92,92,.3);
      border-radius: 8px; color: var(--danger); font-size: .85rem;
      padding: .7rem 1rem; margin-bottom: 1rem; display: none;
    }
    .error-msg.visible { display: block; }

    /* ── TOPBAR ──────────────────────────────────────── */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 56px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .topbar-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: .08em; color: var(--green); }
    .topbar-user { display: flex; align-items: center; gap: 1rem; font-size: .85rem; color: var(--muted); }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-family: var(--font-body); font-size: .8rem;
      padding: .35rem .8rem; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── NAV TABS ────────────────────────────────────── */
    .nav-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; flex-shrink: 0; }
    .nav-tab {
      font-family: var(--font-display); font-size: 1rem; letter-spacing: .08em;
      color: var(--muted); padding: .9rem 1.5rem; cursor: pointer;
      border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .nav-tab:hover  { color: var(--text); }
    .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── PAGES ───────────────────────────────────────── */
    .page { display: none; flex: 1; padding: 2rem; max-width: 1200px; width: 100%; margin: 0 auto; }
    .page.active { display: block; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title  { font-family: var(--font-display); font-size: 2rem; letter-spacing: .06em; }
    .page-title span { color: var(--muted); font-size: 1.2rem; margin-left: .5rem; }
    .last-edit   { font-size: .75rem; color: var(--muted); margin-bottom: 1rem; min-height: 1.2em; }

    .filter-bar { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); font-family: var(--font-body); font-size: .82rem; font-weight: 500;
      padding: .35rem .9rem; cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover  { border-color: var(--text); color: var(--text); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: #0e1110; }

    /* ── PLAYER GRID ─────────────────────────────────── */
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; }
    .player-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.2rem; cursor: pointer; transition: border-color .2s, transform .15s;
    }
    .player-card:hover { border-color: var(--green); transform: translateY(-2px); }
    .player-card-name  { font-weight: 600; font-size: 1rem; margin-bottom: .5rem; }
    .player-tags       { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .7rem; }
    .tag {
      font-size: .72rem; font-weight: 600; letter-spacing: .04em; padding: .2rem .5rem; border-radius: 4px;
      background: rgba(76,175,110,.12); color: var(--green); border: 1px solid rgba(76,175,110,.2);
    }
    .status-badge { display: inline-flex; align-items: center; gap: .35rem; font-size: .75rem; font-weight: 500; padding: .25rem .6rem; border-radius: 20px; }
    .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status-available   { color: var(--green);  background: rgba(76,175,110,.1); }
    .status-injured     { color: var(--danger);  background: rgba(224,92,92,.1); }
    .status-sick        { color: var(--warn);    background: rgba(224,168,92,.1); }
    .status-unavailable { color: var(--info);    background: rgba(92,158,224,.1); }
    .player-meta { font-size: .72rem; color: var(--muted); margin-top: .6rem; }

    /* absence display on player cards */
    .absence-pills { display: flex; flex-direction: column; gap: 3px; margin-top: .6rem; }
    .absence-pill {
      font-size: .7rem; padding: .2rem .5rem; border-radius: 4px;
      display: inline-flex; align-items: center; gap: .3rem; width: fit-content;
    }
    .absence-pill-active   { background: rgba(224,92,92,.1);   color: var(--danger); border: 1px solid rgba(224,92,92,.2); }
    .absence-pill-upcoming { background: rgba(224,168,92,.08); color: var(--warn);   border: 1px solid rgba(224,168,92,.18); }

    /* ── ABSENCE ROWS IN MODAL ───────────────────────── */
    .absence-section { margin-bottom: 1.2rem; }
    .absence-section-label { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .5rem; }
    .absence-rows { display: flex; flex-direction: column; gap: .4rem; margin-bottom: .5rem; }

    .absence-row {
      display: grid;
      grid-template-columns: auto 1fr 1fr 1fr auto;
      gap: .4rem; align-items: center;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: .5rem .6rem;
    }
    @media (max-width: 500px) { .absence-row { grid-template-columns: 1fr 1fr; } }

    .absence-row select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-body); font-size: .8rem;
      padding: .3rem .5rem; outline: none;
    }
    .absence-row input[type="date"] {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-body); font-size: .8rem;
      padding: .3rem .5rem; outline: none; width: 100%;
    }
    .absence-row input[type="text"] {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-body); font-size: .8rem;
      padding: .3rem .5rem; outline: none; width: 100%;
    }
    .absence-row input::placeholder { color: var(--muted); }
    .abs-rm {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; padding: 0 2px; transition: color .15s; line-height: 1;
    }
    .abs-rm:hover { color: var(--danger); }
    .btn-add-absence {
      background: transparent; border: 1px dashed var(--border); border-radius: 6px;
      color: var(--muted); font-size: .82rem; padding: .35rem .75rem; cursor: pointer;
      transition: all .15s; width: 100%;
    }
    .btn-add-absence:hover { border-color: var(--green); color: var(--green); }

    /* ── MATCH LIST ──────────────────────────────────── */
    .match-list { display: flex; flex-direction: column; gap: .75rem; }
    .date-group-header {
      font-family: var(--font-display); font-size: 1rem; letter-spacing: .08em;
      color: var(--muted); padding: .5rem 0 .25rem; border-bottom: 1px solid var(--border); margin-top: 1rem;
    }
    .date-group-header:first-child { margin-top: 0; }
    .match-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      display: flex; align-items: stretch; overflow: hidden;
      cursor: pointer; transition: border-color .2s, transform .15s;
    }
    .match-card:hover { border-color: var(--green); transform: translateY(-1px); }
    .match-diff-bar { width: 5px; flex-shrink: 0; }
    .diff-green { background: var(--diff-green); }
    .diff-blue  { background: var(--diff-blue); }
    .diff-red   { background: var(--diff-red); }
    .diff-black { background: var(--diff-black); }
    .match-card-body { flex: 1; padding: .9rem 1.2rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .match-time-block { min-width: 70px; }
    .match-time    { font-family: var(--font-display); font-size: 1.4rem; letter-spacing: .04em; line-height: 1; }
    .match-main    { flex: 1; min-width: 120px; }
    .match-opponent{ font-weight: 600; font-size: 1rem; }
    .match-location{ font-size: .8rem; color: var(--muted); margin-top: .15rem; }
    .match-badges  { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    .badge { font-size: .72rem; font-weight: 600; letter-spacing: .04em; padding: .2rem .55rem; border-radius: 4px; border: 1px solid; }
    .badge-format     { color: var(--text);       background: rgba(232,237,233,.06); border-color: var(--border); }
    .badge-diff-green { color: var(--diff-green); background: rgba(76,175,110,.1);   border-color: rgba(76,175,110,.25); }
    .badge-diff-blue  { color: var(--diff-blue);  background: rgba(92,158,224,.1);   border-color: rgba(92,158,224,.25); }
    .badge-diff-red   { color: var(--diff-red);   background: rgba(224,92,92,.1);    border-color: rgba(224,92,92,.25); }
    .badge-diff-black { color: var(--diff-black); background: rgba(176,184,179,.08); border-color: rgba(176,184,179,.2); }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); grid-column: 1 / -1; }
    .empty-state p:first-child { font-family: var(--font-display); font-size: 1.4rem; color: var(--text); margin-bottom: .5rem; }

    /* ── LINEUP PAGE ─────────────────────────────────── */
    .lineup-top { display: flex; gap: 1.5rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .lineup-match-field { min-width: 280px; max-width: 400px; margin-bottom: 0; flex: 1; }
    .lineup-formation-group { display: flex; flex-direction: column; gap: .4rem; flex: 2; }
    .field-label { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .formation-btns { display: flex; flex-wrap: wrap; gap: .4rem; }
    .formation-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-family: var(--font-body); font-size: .85rem; font-weight: 500;
      padding: .35rem .8rem; cursor: pointer; transition: all .15s;
    }
    .formation-btn:hover  { border-color: var(--text); color: var(--text); }
    .formation-btn.active { background: var(--green); border-color: var(--green); color: #0e1110; font-weight: 700; }
    .save-indicator { font-size: .78rem; color: var(--muted); align-self: flex-end; white-space: nowrap; }
    .formation-select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font-body); font-size: .95rem;
      padding: .75rem 1rem; outline: none; cursor: pointer; min-width: 160px;
      transition: border-color .2s;
    }
    .formation-select:focus { border-color: var(--green); }
    .custom-formation-row {
      display: none; align-items: center; gap: .5rem; flex-wrap: wrap; margin-top: .4rem;
    }
    .custom-formation-row.visible { display: flex; }
    .custom-formation-row input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font-body); font-size: .95rem;
      padding: .6rem .9rem; outline: none; width: 130px; transition: border-color .2s;
    }
    .custom-formation-row input:focus { border-color: var(--green); }
    .custom-formation-error { font-size: .78rem; color: var(--danger); margin-top: .3rem; width: 100%; }
    .btn-delete-custom {
      font-size: .75rem; color: var(--danger); background: none; border: none;
      cursor: pointer; padding: 0; text-decoration: underline; margin-top: .3rem; display: none;
    }
    .btn-delete-custom.visible { display: inline; }
    .lineup-placeholder { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: .95rem; }

    .lineup-main { display: grid; grid-template-columns: 2.3fr 1fr; gap: 2rem; align-items: start; }
    @media (max-width: 780px) { .lineup-main { grid-template-columns: 1fr; } }

    /* ── PITCH ───────────────────────────────────────── */
    .pitch {
      background: #1e5918;
      background-image: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 48px, rgba(0,0,0,.07) 48px, rgba(0,0,0,.07) 96px);
      border-radius: 10px; position: relative; width: 100%;
      padding: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .pitch::before { content: ''; position: absolute; inset: 8px; border: 2px solid rgba(255,255,255,.15); border-radius: 2px; pointer-events: none; z-index: 0; }
    .pitch::after  { content: ''; position: absolute; left: 8px; right: 8px; top: 50%; height: 2px; background: rgba(255,255,255,.1); pointer-events: none; z-index: 0; }
    .pitch-rows { display: flex; flex-direction: column; gap: 5px; position: relative; z-index: 1; min-height: 460px; }
    .pitch-row  { display: flex; justify-content: space-evenly; align-items: center; flex: 1; gap: 5px; }

    .pos-slot {
      background: rgba(0,0,0,.3); border: 2px solid rgba(255,255,255,.12); border-radius: 8px;
      padding: 4px 5px; min-width: 58px; flex: 1; max-width: 90px;
      text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
    }
    .pos-slot:hover    { border-color: rgba(255,255,255,.3); background: rgba(0,0,0,.45); }
    .pos-slot.selected { border-color: var(--green); background: rgba(76,175,110,.18); box-shadow: 0 0 0 2px rgba(76,175,110,.2); }
    .pos-label  { font-size: .58rem; font-weight: 700; letter-spacing: .06em; color: rgba(255,255,255,.38); text-transform: uppercase; margin-bottom: 3px; }
    .pos-empty  { font-size: 1rem; color: rgba(255,255,255,.18); line-height: 1.4; }
    .pos-players { display: flex; flex-direction: column; gap: 2px; }

    .chip-starter { background: var(--green); color: #0e1110; font-size: 1.1rem; font-weight: 700; padding: 3px 5px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; gap: 2px; overflow: hidden; }
    .chip-sub     { background: var(--green); color: #0e1110; font-size: 1rem; font-weight: 700; padding: 3px 5px; border-radius: 3px; display: flex; align-items: center; justify-content: space-between; gap: 2px; overflow: hidden; }
    .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .chip-rm { background: none; border: none; cursor: pointer; color: inherit; font-size: .75rem; padding: 0 1px; opacity: .5; flex-shrink: 0; line-height: 1; }
    .chip-rm:hover { opacity: 1; color: var(--danger); }

    /* ── PLAYER POOL ─────────────────────────────────── */
    .pool-header { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: .08em; margin-bottom: .4rem; }
    .pool-hint   { font-size: .8rem; color: var(--muted); margin-bottom: .75rem; min-height: 1.1em; }
    .player-pool { display: flex; flex-direction: column; gap: 2px; max-height: 520px; overflow-y: auto; }

    .pool-item {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .45rem .75rem; border-radius: 8px; cursor: pointer;
      transition: background .12s; border: 1px solid transparent;
    }
    .pool-item:hover            { background: var(--surface2); }
    .pool-item.in-selected      { background: rgba(76,175,110,.08); border-color: rgba(76,175,110,.25); }
    .pool-item.pool-unavailable { opacity: .45; pointer-events: none; }

    .pool-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-available   { background: var(--green); }
    .dot-assigned    { background: var(--warn); }
    .dot-unavailable { background: var(--muted); }
    .dot-absent      { background: var(--danger); }

    .pool-info  { flex: 1; min-width: 0; }
    .pool-name  { font-weight: 500; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pool-tags  { font-size: .7rem; color: var(--muted); margin-top: 1px; }
    .pool-absent-reason { font-size: .7rem; color: var(--danger); margin-top: 2px; }

    .pool-right { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; flex-shrink: 0; }
    .pool-badge { font-size: .68rem; color: var(--warn); background: rgba(224,168,92,.1); border: 1px solid rgba(224,168,92,.2); border-radius: 4px; padding: .15rem .4rem; white-space: nowrap; }
    .pool-check { color: var(--green); font-size: .95rem; }

    .conflict-badge { font-size: .65rem; font-weight: 600; padding: .15rem .4rem; border-radius: 4px; white-space: nowrap; }
    .conflict-week  { color: var(--warn);   background: rgba(224,168,92,.12); border: 1px solid rgba(224,168,92,.25); }
    .conflict-time  { color: var(--danger); background: rgba(224,92,92,.12);  border: 1px solid rgba(224,92,92,.25); }

    .pool-section-label {
      font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); padding: .6rem .75rem .3rem; border-top: 1px solid var(--border); margin-top: .25rem;
    }
    .pool-section-label:first-child { border-top: none; margin-top: 0; padding-top: .3rem; }

    /* ── MODALS ──────────────────────────────────────── */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 64px rgba(0,0,0,.6); }
    .modal-title { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: .06em; margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; flex-wrap: wrap; align-items: center; }
    .modal-actions-left { margin-right: auto; }

    .tag-group { margin-bottom: 1rem; }
    .tag-group-label { font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .5rem; }
    .tag-options { display: flex; flex-wrap: wrap; gap: .4rem; }
    .tag-option { font-size: .8rem; font-weight: 600; padding: .3rem .7rem; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; user-select: none; }
    .tag-option:hover    { border-color: var(--green); color: var(--green); }
    .tag-option.selected { background: rgba(76,175,110,.15); border-color: var(--green); color: var(--green); }

    /* ── CONFIRM ─────────────────────────────────────── */
    #confirm-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    #confirm-backdrop.open { display: flex; }
    .confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-width: 360px; width: 100%; }
    .confirm-box p { margin-bottom: 1.2rem; line-height: 1.5; }
    .confirm-actions { display: flex; gap: .75rem; justify-content: flex-end; }
    /* ── MOBILE ──────────────────────────────────────── */
    @media (max-width: 640px) {

      /* Topbar: hide email, tighten up */
      .topbar { padding: 0 1rem; }
      .topbar-logo { font-size: 1.3rem; }
      #user-email { display: none; }

      /* Nav tabs: smaller, all three fit */
      .nav-tabs { padding: 0 .5rem; }
      .nav-tab  { padding: .75rem .9rem; font-size: .85rem; letter-spacing: .05em; }

      /* Pages: less padding */
      .page { padding: 1rem; }

      /* Page header: stack if needed */
      .page-header { margin-bottom: 1rem; }

      /* Login card */
      .login-card { padding: 2rem 1.5rem; }

      /* Player grid: single column on very small screens */
      .player-grid { grid-template-columns: 1fr; }

      /* Match card: tighter */
      .match-card-body { gap: .75rem; padding: .75rem 1rem; }
      .match-time { font-size: 1.1rem; }
      .match-time-block { min-width: 50px; }

      /* Lineup top: stack match + formation full width */
      .lineup-top { flex-direction: column; align-items: stretch; gap: 1rem; }
      .lineup-match-field { min-width: unset; max-width: unset; }
      .lineup-formation-group { flex: unset; }
      .formation-select { width: 100%; }

      /* Pitch: sticky on mobile, tighter rows */
      .pitch-col {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .pitch-rows { min-height: 300px; gap: 3px; }
      .pos-slot { min-width: 44px; padding: 3px 3px; }
      .pos-label { font-size: .52rem; }
      .chip-starter { font-size: .9rem; padding: 2px 3px; }
      .chip-sub     { font-size: .82rem; padding: 2px 3px; background: var(--green); color: #0e1110; }

      /* Player pool: full height below pitch, no scroll cap */
      .player-pool { max-height: none; }

      /* Absence row: stack into 2 columns */
      .absence-row {
        grid-template-columns: 1fr 1fr;
        row-gap: .4rem;
      }
      .absence-row select { grid-column: 1 / -1; }
      .abs-rm { grid-column: 2; justify-self: end; }

      /* Modals: less padding, full width */
      .modal { padding: 1.5rem 1.25rem; }
      .modal-actions { flex-direction: column-reverse; }
      .modal-actions .btn-primary,
      .modal-actions .btn-secondary { width: 100%; text-align: center; }
      .modal-actions-left { margin-right: 0; width: 100%; }
      .modal-actions-left .btn-danger { width: 100%; }

      /* Confirm box */
      .confirm-box { padding: 1.25rem; }
      .confirm-actions { flex-direction: column-reverse; }
      .confirm-actions button { width: 100%; text-align: center; }

      /* Field rows: stack on mobile */
      .field-row { grid-template-columns: 1fr; }
    }
    /* ── OVERVIEW ────────────────────────────────────── */
    .overview-week-nav { display: flex; align-items: center; gap: .75rem; }
    .overview-empty { color: var(--muted); font-size: .95rem; padding: 2rem 0; }

    .overview-table-wrap { overflow-x: auto; }
    .overview-table {
      border-collapse: collapse; width: 100%; min-width: 400px;
      font-size: .88rem;
    }
    .overview-table th {
      background: var(--surface); border: 1px solid var(--border);
      padding: .6rem .9rem; text-align: left; font-weight: 600;
      font-family: var(--font-body); white-space: nowrap;
    }
    .overview-table th.match-col {
      text-align: center; min-width: 110px;
    }
    .overview-table th .match-col-time { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: .04em; display: block; }
    .overview-table th .match-col-opp  { font-size: .78rem; color: var(--muted); font-weight: 400; }
    .overview-table th .match-col-diff { font-size: .7rem; margin-top: 2px; display: inline-block; }

    .overview-table td {
      border: 1px solid var(--border); padding: .45rem .9rem;
      background: var(--bg);
    }
    .overview-table tr:hover td { background: var(--surface2); }
    .overview-table td.player-name-col { font-weight: 500; white-space: nowrap; }
    .overview-table td.dot-col { text-align: center; }

    .ov-dot-selected   { font-size: 1.1rem; line-height: 1; color: var(--green); }
    .ov-dot-absent     { font-size: 1.1rem; line-height: 1; color: var(--danger); }
    .ov-dot-empty      { color: var(--border); font-size: .9rem; }
  </style>
</head>

<!-- ── FIREBASE ──────────────────────────────────────── -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDtWJUooasHwd3PKnx_vHvbE4rzU5iGS40", authDomain:"laguttagning.firebaseapp.com",
    projectId:"laguttagning", storageBucket:"laguttagning.firebasestorage.app",
    messagingSenderId:"946370451262", appId:"1:946370451262:web:b2722c39a375a931183e6f"
  };
  const fbApp = initializeApp(firebaseConfig);
  const auth  = getAuth(fbApp);
  const db    = getFirestore(fbApp);

  // ── Formations & position labels ──────────────────
  const FORMATIONS = {
    '7v7':  ['2-3-1','3-2-1','2-2-2','3-1-2'],
    '9v9':  ['3-3-2','3-2-3','4-2-2','4-3-1','3-4-1','2-4-2','4-1-3','2-3-3','1-4-3','2-1-4-1','2-1-3-2'],
    '11v11':['4-4-2','4-3-3','4-2-3-1','3-5-2','3-4-3','4-1-4-1','4-3-2-1','5-3-2','5-4-1','4-5-1','3-4-2-1','4-1-2-1-2','4-2-2-2','3-3-3-1']
  };
  const ROW_LABELS = {
    def:{1:['CB'],2:['LCB','RCB'],3:['LB','CB','RB'],4:['LB','CB','CB','RB'],5:['LB','CB','CB','CB','RB']},
    mid:{1:['CM'],2:['LCM','RCM'],3:['LM','CM','RM'],4:['LM','CM','CM','RM'],5:['LM','CM','CM','CM','RM']},
    att:{1:['ST'],2:['LW','RW'],3:['LW','ST','RW'],4:['LW','CF','CF','RW']}
  };
  const WEEKDAY    = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
  const DIFF_LABEL = { green:'Grön', blue:'Blå', red:'Röd', black:'Svart' };
  const ABS_LABEL  = { injured:'Skadad', sick:'Sjuk', unavailable:'Förhinder' };

  // ── App state ─────────────────────────────────────
  let currentUser = null, players = [], matches = [], activeFilter = 'all';
  let editingPlayerId = null, editingMatchId = null;
  let unsubPlayers = null, unsubMatches = null, unsubLineup = null, unsubAllLineups = null;
  let currentLineupMatchId = null, lineupFormation = '', lineupSlots = {}, selectedSlot = null;
  let allLineups = {};
  let customFormations = [];   // [{ id, format, formation, createdBy }]
  let unsubCustomFormations = null;
  let modalAbsences = []; // local copy while editing player modal

  // ── Helpers ───────────────────────────────────────
  function showView(n) { document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-'+n).classList.add('active'); }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function formatTs(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  }
  function formatDate(ds) {
    if (!ds) return '';
    return new Date(ds+'T12:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
  }
  function lastEditText(items, el) {
    const latest = [...items].filter(i=>i.updatedAt).sort((a,b)=>(b.updatedAt?.toDate?.()|| 0)-(a.updatedAt?.toDate?.()|| 0))[0];
    el.textContent = latest?.updatedBy ? `Senast redigerat av ${latest.updatedBy} — ${formatTs(latest.updatedAt)}` : '';
  }
  function shortName(player) {
    if (player.displayName) return player.displayName;
    const name = player.name || '';
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length===1 ? p[0] : p[0]+' '+p[p.length-1][0]+'.';
  }
  function todayStr() { return new Date().toISOString().slice(0,10); }

  // ── Absence helpers ───────────────────────────────
  function absenceActiveOnDate(abs, dateStr) {
    if (!abs.from || !dateStr) return false;
    if (dateStr < abs.from) return false;
    if (abs.to && dateStr > abs.to) return false;
    return true;
  }

  function getAbsenceOnDate(player, dateStr) {
    return (player.absences || []).find(a => absenceActiveOnDate(a, dateStr)) || null;
  }

  function isPlayerUnavailableOnDate(player, dateStr) {
    // General status override (no end date set)
    if (player.status && player.status !== 'available') return true;
    // Date-specific absence
    return !!getAbsenceOnDate(player, dateStr);
  }

  function absencePillHtml(abs, cls) {
    const toLabel = abs.to ? ` t.o.m ${formatDate(abs.to)}` : ' (tills vidare)';
    const note    = abs.note ? ` · ${abs.note}` : '';
    return `<span class="absence-pill ${cls}">${ABS_LABEL[abs.type]||abs.type}${toLabel}${note}</span>`;
  }

  // ── Conflict helpers ──────────────────────────────
  function isoWeekKey(ds) {
    if (!ds) return null;
    const d = new Date(ds+'T12:00:00'), isoDay=(d.getDay()+6)%7;
    const thu=new Date(d); thu.setDate(d.getDate()-isoDay+3);
    const ys=new Date(thu.getFullYear(),0,1), wk=Math.ceil(((thu-ys)/86400000+1)/7);
    return `${thu.getFullYear()}-W${String(wk).padStart(2,'0')}`;
  }
  function getConflicts(pid) {
    if (!currentLineupMatchId) return [];
    const cur = matches.find(m=>m.id===currentLineupMatchId);
    const curWeek = isoWeekKey(cur?.date);
    return Object.entries(allLineups)
      .filter(([mid]) => mid !== currentLineupMatchId)
      .filter(([, lu]) => Object.values(lu.slots||{}).some(arr=>arr.includes(pid)))
      .map(([mid, lu]) => { const m=matches.find(x=>x.id===mid); return { m, isTimeCrash: m&&cur&&m.date===cur.date }; })
      .filter(({m}) => m && isoWeekKey(m.date)===curWeek)
      .map(({m, isTimeCrash}) => {
        const d=m.date?new Date(m.date+'T12:00:00'):null;
        const label=`${d?WEEKDAY[d.getDay()]:'?'}${m.time?' '+m.time:''} ${m.opponent||''}`.trim();
        return { label, isTimeCrash };
      });
  }

  function parseFormationRows(formStr) {
    const nums=formStr.split('-').map(Number), n=nums.length;
    const rows=[{rowIdx:0,count:1,labels:['GK']}];
    nums.forEach((count,i) => {
      const type=i===0?'def':(i===n-1?'att':'mid');
      const lmap=ROW_LABELS[type];
      const labels=lmap[count]||Array.from({length:count},(_,j)=>type[0].toUpperCase()+(j+1));
      rows.push({rowIdx:i+1,count,labels});
    });
    return rows;
  }

  function getSlotLabel(key) {
    if (!lineupFormation) return key;
    const m=key.match(/r(\d+)-(\d+)/); if (!m) return key;
    const rows=parseFormationRows(lineupFormation), row=rows[parseInt(m[1])];
    return row ? (row.labels[parseInt(m[2])]||key) : key;
  }

  // ── Tab nav ───────────────────────────────────────
  document.querySelectorAll('.nav-tab').forEach(tab => {

  // ── PLAYERS ───────────────────────────────────────
  function startPlayerListener() {
    unsubPlayers = onSnapshot(collection(db,'players'), snap => {
      players = snap.docs.map(d => {
        const p = { id:d.id, ...d.data() };
        // Recompute status from absences to avoid stale data
        const today = todayStr();
        const openEnded = (p.absences||[]).find(a => !a.to && absenceActiveOnDate(a, today));
        p.status = openEnded ? openEnded.type : 'available';
        return p;
      });
      players.sort((a,b)=>(a.name||'').localeCompare(b.name||'','sv'));
      renderPlayers();
      if (currentLineupMatchId && lineupFormation) renderPlayerPool();
    });
  }

  const statusLabel = {available:'Tillgänglig',injured:'Skadad',sick:'Sjuk',unavailable:'Förhinder'};
  const statusClass = {available:'status-available',injured:'status-injured',sick:'status-sick',unavailable:'status-unavailable'};

  function renderPlayers() {
    const today = todayStr();
    let filtered = players;
    if (activeFilter !== 'all') {
      filtered = players.filter(p => {
        if (activeFilter === 'available') return !isPlayerUnavailableOnDate(p, today);
        // For status filters, check static status OR active absence of that type
        if (p.status === activeFilter) return true;
        const abs = getAbsenceOnDate(p, today);
        return abs?.type === activeFilter;
      });
    }

    document.getElementById('player-count').textContent = `(${players.length})`;
    lastEditText(players, document.getElementById('players-last-edit'));

    const grid = document.getElementById('player-grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><p>${activeFilter==='all'?'Inga spelare ännu':'Inga spelare med den statusen'}</p><p>Lägg till spelare med knappen ovan.</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      // Compute displayed status: absence today overrides static status
      const todayAbs = getAbsenceOnDate(p, today);
      const dispStatus = todayAbs ? todayAbs.type : (p.status || 'available');

      // Active and upcoming absences for display
      const activeAbs   = (p.absences||[]).filter(a => absenceActiveOnDate(a, today));
      const upcomingAbs = (p.absences||[]).filter(a => a.from > today).slice(0,2);

      const pillsHtml = [
        ...activeAbs.map(a => absencePillHtml(a, 'absence-pill-active')),
        ...upcomingAbs.map(a => {
          const fromLabel = formatDate(a.from);
          const toLabel   = a.to ? ` – ${formatDate(a.to)}` : '';
          const note      = a.note ? ` · ${a.note}` : '';
          return `<span class="absence-pill absence-pill-upcoming">Från ${fromLabel}${toLabel}: ${ABS_LABEL[a.type]||a.type}${note}</span>`;
        })
      ].join('');

      return `<div class="player-card" data-id="${p.id}">
        <div class="player-card-name">${escHtml(p.name||'—')}${p.displayName?` <span style="color:var(--muted);font-weight:400;font-size:.85rem">(${escHtml(p.displayName)})</span>`:''}</div>
        <div class="player-tags">${(p.positions||[]).map(pos=>`<span class="tag">${pos}</span>`).join('')}</div>
        <span class="status-badge ${statusClass[dispStatus]||'status-available'}">${statusLabel[dispStatus]||'Tillgänglig'}</span>
        ${pillsHtml?`<div class="absence-pills">${pillsHtml}</div>`:''}
        ${p.updatedBy?`<div class="player-meta">${escHtml(p.updatedBy)} · ${formatTs(p.updatedAt)}</div>`:''}
      </div>`;
    }).join('');

    grid.querySelectorAll('.player-card').forEach(c=>c.addEventListener('click',()=>openPlayerEdit(c.dataset.id)));
  }

  function renderModalAbsences() {

    container.innerHTML = modalAbsences.map((a,i) => `
      <div class="absence-row" data-idx="${i}">
        <select class="abs-type">
          <option value="injured"${a.type==='injured'?' selected':''}>Skadad</option>
          <option value="sick"${a.type==='sick'?' selected':''}>Sjuk</option>
          <option value="unavailable"${a.type==='unavailable'?' selected':''}>Förhinder</option>

        <input type="date" class="abs-to"   value="${escHtml(a.to||'')}"   placeholder="Tills vidare" />

        <button class="abs-rm" data-idx="${i}">×</button>

    container.querySelectorAll('.abs-rm').forEach(btn => {
      btn.addEventListener('click', () => { modalAbsences.splice(parseInt(btn.dataset.idx),1); renderModalAbsences(); });

    }));

  function renderMatches() {

    if (matches.length===0) { list.innerHTML=`<div class="empty-state" style="grid-column:unset"><p>Inga matcher ännu</p><p>Lägg till en match med knappen ovan.</p></div>`; return; }

  // ── Confirm / Delete ──────────────────────────────
  let pendingDelete     = null;
  let pendingConfirmCb  = null;
  const confirmBackdrop = document.getElementById('confirm-backdrop');
  const confirmOkBtn    = document.getElementById('confirm-ok');

  function showConfirm(text, okLabel, okClass, callback) {
    document.getElementById('confirm-text').textContent = text;
    confirmOkBtn.textContent  = okLabel;
    confirmOkBtn.className    = okClass;
    pendingConfirmCb          = callback;
    confirmBackdrop.classList.add('open');

  function openConfirm(type, id, name) {
    pendingDelete = { type, id };
    showConfirm(
      `Vill du ta bort ${name}? Det går inte att ångra.`,
      'Ta bort', 'btn-danger',
      async () => {
        const { type, id } = pendingDelete;
        await deleteDoc(doc(db, type==='player'?'players':'matches', id));
        if (type==='player') closePlayerModal(); else closeMatchModal();
        pendingDelete = null;
      }
    );
  }

  document.getElementById('btn-delete-player').addEventListener('click', () => { const p=players.find(pl=>pl.id===editingPlayerId); if(p) openConfirm('player',editingPlayerId,p.name); });
  document.getElementById('btn-delete-match').addEventListener('click',  () => { const m=matches.find(x=>x.id===editingMatchId);    if(m) openConfirm('match',editingMatchId,m.opponent||'matchen'); });

  // Maps slot position labels to relevant player position tags
  const SLOT_TO_TAGS = {
    'GK':  ['GK'],
    'CB':  ['CB'], 'LCB':['CB'], 'RCB':['CB'],
    'LB':  ['LB','WB'], 'RB':['RB','WB'],
    'WB':  ['WB','LB','RB'],
    'DM':  ['DM','CM'],
    'CM':  ['CM','DM'], 'LCM':['CM','LM'], 'RCM':['CM','RM'],
    'LM':  ['LM','CM'], 'RM':['RM','CM'],
    'AM':  ['AM','CM'],
    'LW':  ['LW'], 'RW':['RW'],
    'ST':  ['ST','CF'], 'CF':['CF','ST'],
  };

  function posMatchScore(player) {
    if (!selectedSlot) return 1;
    const label    = getSlotLabel(selectedSlot);
    const relevant = SLOT_TO_TAGS[label] || [];
    if (!relevant.length) return 1;
    return (player.positions||[]).some(t => relevant.includes(t)) ? 0 : 1;
  }
  function startAllLineupsListener() {
    if (unsubAllLineups) unsubAllLineups();
    unsubAllLineups = onSnapshot(collection(db,'lineups'), snap=>{
      allLineups={};
      snap.docs.forEach(d=>{ allLineups[d.id]=d.data(); });

    });

  function startCustomFormationsListener() {
    if (unsubCustomFormations) unsubCustomFormations();
    unsubCustomFormations = onSnapshot(collection(db,'customFormations'), snap => {
      customFormations = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      // Re-render picker if open
      const match = currentMatch();
      if (match) renderFormationPicker(match.format || '9v9');
    });
  }

  function allFormationsForFormat(format) {
    const custom = customFormations.filter(c => c.format === format).map(c => ({ f: c.formation, custom: true, id: c.id }));
    const builtin = (FORMATIONS[format]||[]).map(f => ({ f, custom: false }));
    return [...builtin, ...custom];
  }

  function validateCustomFormation(input, format) {
    const f = input.trim();
    if (!f || !/^\d+(-\d+)+$/.test(f)) return 'Skriv t.ex. 3-2-3';
    const parts = f.split('-').map(Number);
    const required = { '7v7':6, '9v9':8, '11v11':10 }[format];
    const sum = parts.reduce((a,b) => a+b, 0);
    if (sum !== required) return `Summerar till ${sum} — ska vara ${required} för ${format}`;
    if (parts.length > 5) return 'Max 5 rader (4 bindestreck)';
    if (parts.some(p => p < 1)) return 'Minst 1 spelare per rad';
    if (parts.some(p => p > 5)) return 'Max 5 spelare per rad';
    const all = allFormationsForFormat(format).map(x => x.f);
    if (all.includes(f)) return 'Den formationen finns redan';
    return null;
  }
  function refreshMatchSelector() {
    const sel=document.getElementById('lineup-match-select'); if (!sel) return;
    const cur=currentLineupMatchId||'';
    sel.innerHTML='<option value="">— Välj match —</option>'+matches.map(m=>{
      const d=m.date?new Date(m.date+'T12:00:00'):null;
      const ds=d?d.toLocaleDateString('sv-SE',{weekday:'short',day:'numeric',month:'short'}):'?';
      const em={green:'🟢',blue:'🔵',red:'🔴',black:'⚫'}[m.difficulty]||'';
      return `<option value="${m.id}"${m.id===cur?' selected':''}>${em} ${ds}${m.time?' '+m.time:''} · ${m.opponent||'Okänd'} (${m.format||''})</option>`;
    }).join('');
  }

  document.getElementById('lineup-match-select').addEventListener('change', e=>selectLineupMatch(e.target.value));

  function selectLineupMatch(matchId) {
    if (unsubLineup) { unsubLineup(); unsubLineup=null; }
    currentLineupMatchId=matchId||null;
    selectedSlot=null;
    lineupFormation='';
    lineupSlots={};
    if (!matchId) { document.getElementById('formation-group').style.display='none'; document.getElementById('lineup-body').innerHTML='<div class="lineup-placeholder">Välj en match ovan för att sätta laget.</div>'; return; }
    const match=matches.find(m=>m.id===matchId); if (!match) return;
    renderFormationPicker(match.format||'9v9');
    unsubLineup=onSnapshot(doc(db,'lineups',matchId), snap=>{
      if (snap.exists()) {
        const data=snap.data();
        const valid=[...(FORMATIONS[match.format||'9v9']||[]), ...customFormations.filter(c=>c.format===(match.format||'9v9')).map(c=>c.formation)];
        if (valid.includes(data.formation)) { lineupFormation=data.formation; lineupSlots=data.slots||{}; }
        else { lineupFormation=''; lineupSlots={}; }
      } else { lineupFormation=''; lineupSlots={}; }
      renderFormationPicker(match.format||'9v9');
      renderLineupBody();
      updateCopyButton();
    });
  }

  function currentMatch() { return matches.find(m=>m.id===currentLineupMatchId)||null; }

  function renderFormationPicker(format) {
    const group  = document.getElementById('formation-group');
    const sel    = document.getElementById('formation-select');
    group.style.display = 'flex';

    const all = allFormationsForFormat(format);
    const customForFormat = all.filter(x => x.custom);
    const isCustomSelected = customForFormat.some(x => x.f === lineupFormation);

    sel.innerHTML =
      '<option value="">— Välj formation —</option>' +
      all.map(x => `<option value="${x.f}"${x.f===lineupFormation?' selected':''}>${x.custom?'★ ':''}${x.f}</option>`).join('') +
      '<option value="__custom__">＋ Lägg till annan...</option>';

    sel.onchange = () => {
      if (sel.value === '__custom__') {
        sel.value = lineupFormation || '';
        document.getElementById('custom-formation-row').classList.add('visible');
        document.getElementById('custom-formation-input').focus();
      } else {
        document.getElementById('custom-formation-row').classList.remove('visible');
        document.getElementById('custom-formation-error').textContent = '';
        selectFormation(sel.value);
      }
    };

    // Show/hide delete button for custom formations
    const delBtn = document.getElementById('btn-delete-custom-formation');
    const selectedCustom = customForFormat.find(x => x.f === lineupFormation);
    if (selectedCustom) {
      delBtn.classList.add('visible');
      delBtn.dataset.id = selectedCustom.id;
    } else {
      delBtn.classList.remove('visible');
    }
  }

  function selectFormation(f) {
    if (!f || f===lineupFormation) return;
    const hasPlayers = Object.values(lineupSlots).some(arr=>arr.length>0);
    if (hasPlayers) {
      showConfirm(
        'Byta formation raderar nuvarande uppställning. Vill du fortsätta?',
        'Byt formation', 'btn-primary',
        () => { applyFormation(f); }
      );
    } else {
      applyFormation(f);
    }
  }

  function applyFormation(f) {
    lineupFormation=f; lineupSlots={}; selectedSlot=null;
    saveLineup();
    renderFormationPicker(currentMatch()?.format||'9v9');
    renderLineupBody();
  }

  function renderLineupBody() {
    const body=document.getElementById('lineup-body');
    if (!currentLineupMatchId) { body.innerHTML='<div class="lineup-placeholder">Välj en match ovan.</div>'; return; }
    if (!lineupFormation) { body.innerHTML='<div class="lineup-placeholder">Välj en formation ovan för att fortsätta.</div>'; return; }
    body.innerHTML=`<div class="lineup-main">
      <div class="pitch-col"><div class="pitch" id="pitch"><div class="pitch-rows" id="pitch-rows"></div></div></div>
      <div class="pool-col"><div class="pool-header">SPELARE</div><div class="pool-hint" id="pool-hint">Välj en position på planen för att lägga till spelare</div><div class="player-pool" id="player-pool"></div></div>
    </div>`;
    renderPitch(); renderPlayerPool();
  }

  function renderPitch() {
    const pitchRows=document.getElementById('pitch-rows'); if (!pitchRows) return;
    const rows=parseFormationRows(lineupFormation);
    pitchRows.innerHTML=[...rows].reverse().map(row=>{
      return `<div class="pitch-row">${Array.from({length:row.count},(_,pi)=>{
        const key=`r${row.rowIdx}-${pi}`, label=row.labels[pi]||'', pids=lineupSlots[key]||[], sel=selectedSlot===key;
        const chips=pids.map((pid,ci)=>{
          const pl=players.find(p=>p.id===pid), name=pl?escHtml(shortName(pl)):'?';
          return `<div class="${ci===0?'chip-starter':'chip-sub'}"><span class="chip-name">${name}</span><button class="chip-rm" data-slot="${key}" data-pid="${pid}">×</button></div>`;
        }).join('');
        return `<div class="pos-slot${sel?' selected':''}" data-slot="${key}"><div class="pos-label">${label}</div><div class="pos-players">${chips}</div>${pids.length===0?'<div class="pos-empty">+</div>':''}</div>`;
      }).join('')}</div>`;
    }).join('');

    pitchRows.querySelectorAll('.pos-slot').forEach(el=>el.addEventListener('click',e=>{if(!e.target.classList.contains('chip-rm')) selectSlot(el.dataset.slot);}));
    pitchRows.querySelectorAll('.chip-rm').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation(); removeFromSlot(btn.dataset.slot,btn.dataset.pid);}));
  }

  function renderPlayerPool() {
    const pool=document.getElementById('player-pool'); if (!pool) return;
    const match=currentMatch();
    const matchDate=match?.date||null;

    const assignedMap={};
    Object.entries(lineupSlots).forEach(([k,pids])=>pids.forEach(pid=>{assignedMap[pid]=k;}));

    function renderPoolItem(p) {
      const assignedSlot=assignedMap[p.id];
      const unavailableToday=isPlayerUnavailableOnDate(p, matchDate||todayStr());
      const absOnMatchDate = matchDate ? getAbsenceOnDate(p,matchDate) : null;
      const staticUnavail  = p.status && p.status !== 'available';
      const isUnavail = matchDate ? isPlayerUnavailableOnDate(p,matchDate) : (p.status&&p.status!=='available');
      const inSelected=selectedSlot&&(lineupSlots[selectedSlot]||[]).includes(p.id);
      const conflicts=getConflicts(p.id);

      let dotCls = isUnavail ? 'dot-absent' : (assignedSlot?'dot-assigned':'dot-available');
      if (conflicts.length && !isUnavail && !assignedSlot) dotCls='dot-assigned';

      let cls='pool-item'+(inSelected?' in-selected':'')+(isUnavail?' pool-unavailable':'');

      const slotLabel=assignedSlot?getSlotLabel(assignedSlot):'';
      const tags=(p.positions||[]).join(' ');

      let absReasonHtml='';
      if (isUnavail) {
        if (absOnMatchDate) absReasonHtml=`<div class="pool-absent-reason">${ABS_LABEL[absOnMatchDate.type]||absOnMatchDate.type}${absOnMatchDate.to?` t.o.m ${formatDate(absOnMatchDate.to)}`:' (tills vidare)'}${absOnMatchDate.note?' · '+absOnMatchDate.note:''}</div>`;
        else if (staticUnavail) absReasonHtml=`<div class="pool-absent-reason">${statusLabel[p.status]||p.status}</div>`;
      }

      const conflictBadgesHtml=conflicts.length
        ?`<div style="display:flex;flex-direction:column;gap:2px">${conflicts.map(c=>`<span class="conflict-badge ${c.isTimeCrash?'conflict-time':'conflict-week'}">${c.isTimeCrash?'⚡ ':''}${escHtml(c.label)}</span>`).join('')}</div>`:'';

      return `<div class="${cls}" data-pid="${p.id}">
        <div class="pool-dot ${dotCls}"></div>
        <div class="pool-info"><div class="pool-name">${escHtml(shortName(p))}</div>${tags?`<div class="pool-tags">${escHtml(tags)}</div>`:''}${absReasonHtml}</div>
        <div class="pool-right">
          ${assignedSlot&&!inSelected?`<span class="pool-badge">${escHtml(slotLabel)}</span>`:''}
          ${inSelected?'<span class="pool-check">✓</span>':''}
          ${conflictBadgesHtml}
        </div>
      </div>`;
    }

    const availAll  = players.filter(p=>!isPlayerUnavailableOnDate(p, matchDate||todayStr()));
    const availMatch= availAll.filter(p=>posMatchScore(p)===0).sort((a,b)=>shortName(a).localeCompare(shortName(b),'sv'));
    const availRest = availAll.filter(p=>posMatchScore(p)!==0).sort((a,b)=>shortName(a).localeCompare(shortName(b),'sv'));
    const unavail   = players.filter(p=> isPlayerUnavailableOnDate(p, matchDate||todayStr())).sort((a,b)=>shortName(a).localeCompare(shortName(b),'sv'));

    let html='';
    if (availMatch.length && availRest.length) {
      html += availMatch.map(renderPoolItem).join('');
      html += '<div style="border-top:1px solid var(--border);margin:.4rem 0"></div>';
      html += availRest.map(renderPoolItem).join('');
    } else {
      html += [...availMatch,...availRest].map(renderPoolItem).join('');
    }
    if (unavail.length) { html+='<div class="pool-section-label">Ej tillgängliga</div>'+unavail.map(renderPoolItem).join(''); }
    pool.innerHTML=html;

    pool.querySelectorAll('.pool-item:not(.pool-unavailable)').forEach(el=>{
      el.addEventListener('click',()=>{ if(selectedSlot) toggleInSlot(el.dataset.pid); });
    });
  }

  function selectSlot(key) {
    selectedSlot = key;
    const n=(lineupSlots[key]||[]).length, label=getSlotLabel(key);
    const hint=document.getElementById('pool-hint');
    if (hint) hint.textContent=`Lägger till i: ${label} · ${n===0?'Ingen ännu':(n===1?'1 spelare':n+' spelare')}`;
    renderPitch(); renderPlayerPool();
    // Scroll player pool to top so position-sorted players are visible
    const pool = document.getElementById('player-pool');
    if (pool) pool.scrollTop = 0;
    // On mobile: scroll so pool-col top appears just below the sticky pitch
    if (window.innerWidth <= 640) {
      const pitchEl = document.querySelector('.pitch');
      const poolCol = document.querySelector('.pool-col');
      if (pitchEl && poolCol) {
        const pitchHeight = pitchEl.getBoundingClientRect().height;
        const poolTop     = poolCol.getBoundingClientRect().top + window.scrollY;
        window.scrollTo({ top: poolTop - pitchHeight - 8, behavior: 'smooth' });
      }
    }
  }

  function toggleInSlot(pid) {
    if (!selectedSlot) return;
    const cur=lineupSlots[selectedSlot]||[];
    if (cur.includes(pid)) {
      const updated=cur.filter(id=>id!==pid);
      if (updated.length) lineupSlots[selectedSlot]=updated; else delete lineupSlots[selectedSlot];
    } else {
      Object.keys(lineupSlots).forEach(k=>{ if(k!==selectedSlot){ lineupSlots[k]=lineupSlots[k].filter(id=>id!==pid); if(!lineupSlots[k].length) delete lineupSlots[k]; }});
      lineupSlots[selectedSlot]=[...cur,pid];
    }
    saveLineup(); selectSlot(selectedSlot);
  }

  function removeFromSlot(slotKey,pid) {
    if (!lineupSlots[slotKey]) return;
    lineupSlots[slotKey]=lineupSlots[slotKey].filter(id=>id!==pid);
    if (!lineupSlots[slotKey].length) delete lineupSlots[slotKey];
    saveLineup(); renderPitch(); renderPlayerPool();
  }

  document.getElementById('btn-copy-lineup').addEventListener('click', () => {
    const match = currentMatch();
    const allPids = [...new Set(Object.values(lineupSlots).flat())];
    if (!allPids.length) { alert('Inga spelare uttagna ännu.'); return; }

    const names = allPids
      .map(pid => players.find(p => p.id === pid))
      .filter(Boolean)
      .map(p => p.name || '')
      .sort((a, b) => a.localeCompare(b, 'sv'));

    const d = match?.date ? new Date(match.date + 'T12:00:00') : null;
    const dateStr = d ? `${WEEKDAY[d.getDay()]} ${d.toLocaleDateString('sv-SE', {day:'numeric', month:'long'})}` : '';
    const header = [match?.opponent, dateStr, match?.time].filter(Boolean).join(' · ');

    const text = (header ? header + '\n\n' : '') + names.join('\n');

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('btn-copy-lineup');
      btn.textContent = 'Kopierat ✓';
      setTimeout(() => { btn.textContent = 'Kopiera lista'; }, 2000);
    }).catch(() => alert('Kunde inte kopiera. Försök igen.'));
  });

  // ── OVERVIEW ──────────────────────────────────────
  let overviewWeekOffset = 0; // 0 = current/nearest week with matches

  function getWeekMatches(offset) {
    // Find all unique ISO week keys from matches, sorted
    const weekKeys = [...new Set(matches.map(m => isoWeekKey(m.date)).filter(Boolean))].sort();
    if (!weekKeys.length) return { weekKey: null, weekMatches: [] };

    // Find nearest upcoming week (or current) as base
    const today = todayStr();
    const todayWeek = isoWeekKey(today);
    const futureWeeks = weekKeys.filter(w => w >= todayWeek);
    const baseIdx = futureWeeks.length
      ? weekKeys.indexOf(futureWeeks[0])
      : weekKeys.length - 1;

    const idx = Math.max(0, Math.min(weekKeys.length - 1, baseIdx + offset));
    const weekKey = weekKeys[idx];
    const weekMatches = matches.filter(m => isoWeekKey(m.date) === weekKey)
      .sort((a,b) => (`${a.date}T${a.time||'00:00'}`).localeCompare(`${b.date}T${b.time||'00:00'}`));
    return { weekKey, weekMatches, idx, total: weekKeys.length };
  }

  function weekKeyToLabel(wk) {
    if (!wk) return '';
    const [year, w] = wk.split('-W');
    // Get Monday of that ISO week
    const jan4 = new Date(parseInt(year), 0, 4);
    const monday = new Date(jan4);
    monday.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7) + (parseInt(w) - 1) * 7);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    return `Vecka ${w} · ${monday.toLocaleDateString('sv-SE',{day:'numeric',month:'short'})} – ${sunday.toLocaleDateString('sv-SE',{day:'numeric',month:'short',year:'numeric'})}`;
  }

  function renderOverview() {
    const body = document.getElementById('overview-body');
    const label = document.getElementById('overview-week-label');
    if (!body) return;

    const { weekKey, weekMatches, idx, total } = getWeekMatches(overviewWeekOffset);

    document.getElementById('btn-week-prev').disabled = !idx;
    document.getElementById('btn-week-next').disabled = idx >= total - 1;
    label.textContent = weekKey ? weekKeyToLabel(weekKey) : '—';

    if (!weekMatches.length) {
      body.innerHTML = '<div class="overview-empty">Inga matcher denna vecka.</div>';
      return;
    }

    const today = todayStr();
    const DIFF_EMOJI = { green:'🟢', blue:'🔵', red:'🔴', black:'⚫' };

    // Build matrix
    // Columns = matches, Rows = players (sorted by shortName)
    const sortedPlayers = [...players].sort((a,b) => shortName(a).localeCompare(shortName(b),'sv'));

    // For each match, get assigned player IDs from allLineups
    const matchLineups = weekMatches.map(m => {
      const lu = allLineups[m.id];
      const pids = lu ? [...new Set(Object.values(lu.slots||{}).flat())] : [];
      return { match: m, pids: new Set(pids) };
    });

    // Header row
    let html = '<div class="overview-table-wrap"><table class="overview-table"><thead><tr>';
    html += '<th>Spelare</th>';
    matchLineups.forEach(({ match: m }) => {
      const d = m.date ? new Date(m.date+'T12:00:00') : null;
      const dayStr = d ? `${WEEKDAY[d.getDay()]} ${d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'})}` : '?';
      html += `<th class="match-col">
        <span class="match-col-time">${escHtml(m.time||'?')}</span>
        <span class="match-col-opp">${escHtml(m.opponent||'—')}</span><br>
        <span class="match-col-opp">${dayStr}</span>
        <span class="match-col-diff">${DIFF_EMOJI[m.difficulty]||''}</span>
      </th>`;
    });
    html += '</tr></thead><tbody>';

    // Player rows
    sortedPlayers.forEach(p => {
      const absentOnAny = matchLineups.some(({ match: m }) => isPlayerUnavailableOnDate(p, m.date||today));
      const selectedForAny = matchLineups.some(({ pids }) => pids.has(p.id));
      html += `<tr><td class="player-name-col">${escHtml(shortName(p))}</td>`;
      matchLineups.forEach(({ match: m, pids }) => {
        const absent   = isPlayerUnavailableOnDate(p, m.date||today);
        const selected = pids.has(p.id);
        let cell;
        if (absent)        cell = '<span class="ov-dot-absent" title="Ej tillgänglig">●</span>';
        else if (selected) cell = '<span class="ov-dot-selected" title="Uttagen">●</span>';
        else               cell = '<span class="ov-dot-empty">·</span>';
        html += `<td class="dot-col">${cell}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';

    // Legend
    html += `<div style="display:flex;gap:1.5rem;margin-top:1rem;font-size:.78rem;color:var(--muted)">
      <span><span style="color:var(--green)">●</span> Uttagen</span>
      <span><span style="color:var(--danger)">●</span> Ej tillgänglig</span>
      <span><span style="color:var(--border)">·</span> Ej uttagen</span>
    </div>`;

    body.innerHTML = html;
  }

  document.getElementById('btn-week-prev').addEventListener('click', () => { overviewWeekOffset--; renderOverview(); });
  document.getElementById('btn-week-next').addEventListener('click', () => { overviewWeekOffset++; renderOverview(); });

  document.getElementById('btn-save-custom-formation').addEventListener('click', async () => {
    const match  = currentMatch(); if (!match) return;
    const input  = document.getElementById('custom-formation-input');
    const errEl  = document.getElementById('custom-formation-error');
    const f      = input.value.trim();
    const error  = validateCustomFormation(f, match.format||'9v9');
    if (error) { errEl.textContent = error; return; }
    errEl.textContent = '';
    try {
      await addDoc(collection(db,'customFormations'), { format: match.format||'9v9', formation: f, createdBy: currentUser?.email||'okänd' });
      input.value = '';
      document.getElementById('custom-formation-row').classList.remove('visible');
      lineupFormation = f;
      lineupSlots = {};
      saveLineup();
    } catch(err) { console.error(err); errEl.textContent = 'Kunde inte spara. Försök igen.'; }
  });

  document.getElementById('btn-cancel-custom-formation').addEventListener('click', () => {
    document.getElementById('custom-formation-row').classList.remove('visible');
    document.getElementById('custom-formation-error').textContent = '';
    document.getElementById('custom-formation-input').value = '';
  });

  document.getElementById('custom-formation-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-save-custom-formation').click();
    if (e.key === 'Escape') document.getElementById('btn-cancel-custom-formation').click();
  });

  document.getElementById('btn-delete-custom-formation').addEventListener('click', () => {
    const btn = document.getElementById('btn-delete-custom-formation');
    if (!btn.dataset.id) return;
    const fName = lineupFormation;
    showConfirm(
      `Ta bort formationen ${fName}? Den försvinner för alla tränare.`,
      'Ta bort', 'btn-danger',
      async () => {
        await deleteDoc(doc(db,'customFormations', btn.dataset.id));
        lineupFormation=''; lineupSlots={};
        renderFormationPicker(currentMatch()?.format||'9v9');
        renderLineupBody();
      }
    );
  });

  function updateCopyButton() {
    const btn = document.getElementById('btn-copy-lineup');
    if (!btn) return;
    const hasLineup = currentLineupMatchId && lineupFormation && Object.keys(lineupSlots).length > 0;
    btn.style.display = hasLineup ? 'inline-flex' : 'none';
  }

  async function saveLineup() {
    if (!currentLineupMatchId||!lineupFormation) return;
    const ind=document.getElementById('save-indicator');
    if (ind) ind.textContent='Sparar...';
    try {
      await setDoc(doc(db,'lineups',currentLineupMatchId),{formation:lineupFormation,slots:lineupSlots,updatedBy:currentUser?.email||'okänd',updatedAt:serverTimestamp()});
      if (ind) { ind.textContent='Sparat ✓'; setTimeout(()=>{if(ind)ind.textContent='';},2000); }
    } catch(err) { console.error(err); if(ind) ind.textContent='Fel vid sparning'; }
    updateCopyButton();
  }
</script>
</body>
</html>
